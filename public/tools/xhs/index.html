<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>老谭小红书内容工作台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f3ef;color:#1a1a1a;padding:16px;max-width:1400px;margin:0 auto}
.workspace{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;align-items:start}@media(max-width:960px){.workspace{grid-template-columns:1fr}}
h1{font-size:20px;margin:8px 0 4px}
.sub{color:#888;font-size:13px;margin-bottom:14px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.card h2{font-size:16px;margin-bottom:10px}
label{display:block;font-size:13px;font-weight:700;color:#555;margin-bottom:4px;margin-top:10px}
label:first-of-type{margin-top:0}
input,textarea,select{width:100%;border:1px solid #ddd;border-radius:8px;padding:10px;font-size:15px;font-family:inherit;background:#fafafa}
textarea{min-height:80px;resize:vertical}
.btn{display:inline-block;padding:12px 20px;border:0;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;width:100%}.row .btn{width:auto;flex:1}@media(min-width:961px){.btn{width:auto}}
.btn-primary{background:#1a1a1a;color:#fff}
.btn-blue{background:#e8f1ff;color:#155eef}
.btn-outline{background:#fff;border:2px solid #ddd;color:#333}
.btn:active{opacity:.8}
.btn:disabled{opacity:.5}
.row{display:flex;gap:8px;margin-top:10px}
.row .btn{flex:1}
.upload-label{display:inline-block;width:100%;padding:14px;border:2px dashed #ccc;border-radius:10px;text-align:center;color:#888;font-size:14px;cursor:pointer;background:#fafafa}
.upload-label:active{background:#eee}
.upload-label.has-images{border-color:#155eef;color:#155eef;background:#eef4ff}
input[type=file]{display:none}
.thumb-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.thumb-row img{width:70px;height:70px;object-fit:cover;border-radius:8px;border:1px solid #eee}
.result{background:#fafafa;border-radius:10px;padding:14px;min-height:60px;white-space:pre-wrap;font-size:14px;line-height:1.7;max-height:60vh;overflow:auto;margin-top:10px}
.result:empty::after{content:"等待生成...";color:#bbb}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:999;opacity:0;transition:.3s}
.toast.show{opacity:1}
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-right:4px}
.badge-ok{background:#e8f5e9;color:#2e7d32}
.badge-warn{background:#fff3e0;color:#e65100}
.status{margin-bottom:10px;font-size:12px}
</style>
</head>
<body>

<h1>老谭小红书内容工作台</h1>
<div class="sub">DeepSeek 生成 · Qwen-VL 识图 · 移动端优化</div>
<div class="status" id="status"><span class="badge badge-warn">检测中...</span></div>

<div class="workspace">

<!-- 对标图文 -->
<div class="card">
  <h2>📌 对标图文</h2>
  <label>对标标题</label><input id="bTitle" placeholder="把对标笔记标题放这里">
  <label>对标正文/OCR</label><textarea id="bText" placeholder="粘贴对标正文或截图OCR文字"></textarea>
  <label>我喜欢它哪里</label><textarea id="bNotes" placeholder="例：封面冲突强、节奏好、结尾引导自然"></textarea>
  <label>上传对标截图</label>
  <label class="upload-label" for="bImages" id="bLabel">📷 点击选择对标截图（最多3张）</label>
  <input type="file" id="bImages" accept="image/*" multiple>
  <div class="thumb-row" id="bThumbs"></div>
  <div class="row">
    <button class="btn btn-blue" id="btnAnalyze" onclick="doAnalyze()">🔍 拆解对标文案</button>
  </div>
  <label>拆解结果</label><textarea id="bAnalysis" placeholder="拆解结果会显示在这里" readonly></textarea>
</div>

<!-- 我的素材 -->
<div class="card">
  <h2>🎨 我的素材</h2>
  <label>品牌</label>
  <select id="brand">
    <option value="brand1">8K设计</option>
    <option value="brand2">玖玖精工/半包</option>
    <option value="brand3">玖玖精装</option>
    <option value="brand4" selected>宅师傅半包装修</option>
  </select>
  <label>核心观点</label><input id="core" placeholder="例：装修前不要先问总价，要先看清方案和报价边界">
  <label>我的文字素材</label><textarea id="myNotes" placeholder="例：长沙120平改善房，业主拿了三份报价准备签合同"></textarea>
  <label>上传效果图/实拍</label>
  <label class="upload-label" for="myImages" id="mLabel">📷 点击选择效果图（最多2张）</label>
  <input type="file" id="myImages" accept="image/*" multiple>
  <div class="thumb-row" id="mThumbs"></div>
  <div class="grid2" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
    <div><label>目标人群</label><select id="audience"><option>长沙准备装修的业主</option><option>正在比价的业主</option><option>准备签合同的业主</option></select></div>
    <div><label>图片页数</label><select id="pages"><option>6</option><option>7</option><option>8</option></select></div>
  </div>
  <label>必须出现</label><input id="must" placeholder="例：长沙、报价体检、先判断再签约">
  <label>不能出现</label><input id="avoid" placeholder="例：绝对承诺、贬低公司、恐吓">
</div>

<!-- 生成 -->
<div class="card">
  <h2>✨ 生成小红书</h2>
  <button class="btn btn-primary" id="btnGenerate" onclick="doGenerate()">🚀 生成小红书图文方案</button>
  <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap" id="tabs">
    <button class="btn btn-outline active" style="flex:0 0 auto;padding:8px 14px;font-size:13px" onclick="switchTab('final')">最终版</button>
    <button class="btn btn-outline" style="flex:0 0 auto;padding:8px 14px;font-size:13px" onclick="switchTab('titles')">标题</button>
    <button class="btn btn-outline" style="flex:0 0 auto;padding:8px 14px;font-size:13px" onclick="switchTab('script')">图片脚本</button>
    <button class="btn btn-outline" style="flex:0 0 auto;padding:8px 14px;font-size:13px" onclick="switchTab('check')">发布检查</button>
  </div>
  <div class="result" id="resultFinal"></div>
  <div class="result" id="resultTitles" style="display:none"></div>
  <div class="result" id="resultScript" style="display:none"></div>
  <div class="result" id="resultCheck" style="display:none"></div>
  <div class="row">
    <button class="btn btn-outline" onclick="copyResult()">📋 复制</button>
  </div>
</div>

</div><!-- workspace -->

<div class="toast" id="toast"></div>

<script>
// State
var state = { bImages:[], mImages:[], currentTab:'final', lastResult:{} };
var MAX = { bImages:3, mImages:2 };

// Helpers
function $(id){return document.getElementById(id)}
function toast(msg){var t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1800)}

// Image upload
function handleImages(inputId, labelId, thumbId, key){
  $(inputId).onchange = function(e){
    var files = Array.from(e.target.files);
    var label = $(labelId);
    var added = 0;
    files.forEach(function(file){
      if(!file.type.startsWith('image/')) return;
      if(state[key].length >= MAX[key]) return;
      var reader = new FileReader();
      reader.onload = function(ev){
        state[key].push({name:file.name,dataUrl:ev.target.result,size:Math.round(ev.target.result.length*0.75)});
        added++;
        renderThumbs(thumbId, key);
        if(state[key].length > 0){
          label.classList.add('has-images');
          label.textContent = '已选 '+state[key].length+' 张，点击换图';
        }
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  };
}
function renderThumbs(thumbId, key){
  var box = $(thumbId);
  box.innerHTML = '';
  state[key].forEach(function(img,i){
    var div = document.createElement('div');
    div.style.cssText = 'position:relative;display:inline-block';
    div.innerHTML = '<img src="'+img.dataUrl+'" style="width:70px;height:70px;object-fit:cover;border-radius:8px"><button style="position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;border:0;background:#e00;color:#fff;font-size:12px;cursor:pointer" onclick="removeImg(\''+key+'\','+i+',\''+thumbId+'\',\''+labelId(key)+'\')">×</button>';
    box.appendChild(div);
  });
}
function labelId(key){return key==='bImages'?'bLabel':'mLabel'}
function removeImg(key,i,thumbId,lid){
  state[key].splice(i,1);
  renderThumbs(thumbId, key);
  var label = $(lid);
  if(state[key].length === 0){
    label.classList.remove('has-images');
    label.textContent = key==='bImages'?'📷 点击选择对标截图（最多3张）':'📷 点击选择效果图（最多2张）';
  } else {
    label.textContent = '已选 '+state[key].length+' 张，点击换图';
  }
}

handleImages('bImages','bLabel','bThumbs','bImages');
handleImages('myImages','mLabel','mThumbs','mImages');

// Data collection
function getData(){
  return {
    benchmarkTitle: $('bTitle').value.slice(0,500),
    benchmarkText: $('bText').value.slice(0,1000),
    benchmarkNotes: $('bNotes').value.slice(0,800),
    benchmarkAnalysis: $('bAnalysis').value.slice(0,800),
    brandSlot: $('brand').value,
    brandName: $('brand').selectedOptions[0].text,
    corePoint: $('core').value.slice(0,200),
    myNotes: $('myNotes').value.slice(0,1000),
    mustSay: $('must').value.slice(0,300),
    avoidSay: $('avoid').value.slice(0,300),
    audience: $('audience').value,
    pageCount: $('pages').value,
    mode: '快速生成',
    template: '避坑型',
    skills: ['去 AI 味','小红书爆款结构','故事化表达','强冲突标题','老谭装修顾问语气'],
    imageCounts: {benchmark:state.bImages.length, mine:state.mImages.length},
    images: {
      benchmark: state.bImages.map(function(x){return {name:x.name,dataUrl:x.dataUrl,size:x.size}}),
      mine: state.mImages.map(function(x){return {name:x.name,dataUrl:x.dataUrl,size:x.size}})
    }
  };
}

// Tab switch
function switchTab(tab){
  ['final','titles','script','check'].forEach(function(t){
    $('result'+(t.charAt(0).toUpperCase()+t.slice(1))).style.display = (t===tab)?'block':'none';
  });
  var btns = document.querySelectorAll('#tabs .btn');
  btns.forEach(function(b){b.classList.remove('active')});
  event.target.classList.add('active');
  state.currentTab = tab;
}

// Copy
function copyResult(){
  var tab = state.currentTab || 'final';
  var el = $('result'+(tab.charAt(0).toUpperCase()+tab.slice(1)));
  var text = el.textContent;
  if(!text || text === '等待生成...'){toast('没有内容可复制');return}
  navigator.clipboard.writeText(text).then(function(){toast('已复制')}).catch(function(){toast('复制失败')});
}

// Analyze benchmark
function doAnalyze(){
  var btn = $('btnAnalyze');
  btn.disabled = true;
  btn.textContent = '拆解中...';
  var d = getData();
  fetch('/api/xhs-generate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'benchmark-analysis',input:d})
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error(t)});
    return r.json();
  }).then(function(json){
    var ba = json.benchmarkAnalysis;
    $('bAnalysis').value = typeof ba === 'string' ? ba : JSON.stringify(ba,null,2);
    toast('拆解完成');
  }).catch(function(e){
    $('bAnalysis').value = '拆解失败：'+String(e.message||e).slice(0,300);
    toast('拆解失败');
  }).finally(function(){
    btn.disabled = false;
    btn.textContent = '🔍 拆解对标文案';
  });
}

// Generate
function doGenerate(){
  var btn = $('btnGenerate');
  btn.disabled = true;
  btn.textContent = '生成中（约15-30秒）...';
  $('resultFinal').textContent = '⏳ DeepSeek 正在生成...';
  var d = getData();
  fetch('/api/xhs-generate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'generate',input:d})
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error(t)});
    return r.json();
  }).then(function(json){
    state.lastResult = json;
    var final = json.final || '';
    if(typeof final === 'object') final = JSON.stringify(final,null,2);
    $('resultFinal').textContent = final || '（无内容）';
    $('resultTitles').textContent = typeof json.titles === 'string' ? json.titles : JSON.stringify(json.titles||{},null,2);
    $('resultScript').textContent = typeof json.script === 'string' ? json.script : JSON.stringify(json.script||{},null,2);
    $('resultCheck').textContent = typeof json.check === 'string' ? json.check : JSON.stringify(json.check||{},null,2);
    switchTab('final');
    // Update status
    if(json.readState) $('status').innerHTML = '<span class="badge badge-ok">DeepSeek</span><span class="badge badge-ok">识图:'+(json.readState.imageReadable?'✅':'文字')+'</span>';
    toast('生成完成');
  }).catch(function(e){
    $('resultFinal').textContent = '生成失败：'+String(e.message||e).slice(0,500);
    toast('生成失败');
  }).finally(function(){
    btn.disabled = false;
    btn.textContent = '🚀 生成小红书图文方案';
  });
}

// Init
(function(){
  fetch('/api/xhs-generate',{method:'GET'}).then(function(r){return r.json()}).then(function(j){
    $('status').innerHTML = '<span class="badge badge-ok">✅ DeepSeek</span><span class="badge badge-ok">识图:'+(j.vision==='qwen-vl'?'Qwen-VL':'GPT')+'</span>';
  }).catch(function(){
    $('status').innerHTML = '<span class="badge badge-warn">⚠️ 接口检测失败</span>';
  });
})();
</script>
</body>
</html>
