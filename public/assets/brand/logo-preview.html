<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>老谭 Logo 预览</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#f3f1ec;color:#191816;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}
    main{width:min(980px,92vw);margin:0 auto;padding:48px 0 72px}
    h1{margin:0 0 10px;font-size:42px;line-height:1.08;letter-spacing:0}
    p{margin:0;color:#6f6a61;line-height:1.7;font-weight:700}
    .grid{display:grid;gap:18px;margin-top:30px}
    .card{border:1px solid rgba(25,24,22,.12);border-radius:8px;background:#fff;padding:20px;box-shadow:0 14px 44px rgba(38,31,22,.07)}
    .card.dark{background:#191816;color:#fff}
    .card.dark p{color:#d8d2c9}
    img{display:block;max-width:100%;height:auto}
    .mark-row{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
    .mark{width:148px}
    .note{font-size:13px;margin-top:14px}
  </style>
</head>
<body>
  <main>
    <h1>老谭终身品牌 Logo</h1>
    <p>关键词：签约前判断、报价合同避坑、长期信用沉淀。符号保留“谭”，加入标尺线和判断框，避免装修公司销售感。</p>
    <section class="grid">
      <article class="card">
        <img src="laotan-logo.svg" alt="老谭装修顾问 Logo 横版" />
        <p class="note">浅色横版：官网页头、PPT 封面、服务介绍。</p>
      </article>
      <article class="card dark">
        <img src="laotan-logo-dark.svg" alt="老谭装修顾问 Logo 深色横版" />
        <p class="note">深色横版：深色页头、封面图、视频片头。</p>
      </article>
      <article class="card">
        <div class="mark-row">
          <img class="mark" src="laotan-mark.svg" alt="老谭品牌方形主标" />
          <div>
            <h2>方形主标</h2>
            <p>适合头像、favicon、工具入口、小红书封面角标。</p>
          </div>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
