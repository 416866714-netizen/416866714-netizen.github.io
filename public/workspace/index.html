<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>老谭AI作战指挥室｜内部入口</title>
  <meta name="theme-color" content="#f7f1e8" />
  <style>
    :root{--ink:#111;--muted:#68615a;--line:rgba(17,17,17,.12);--soft:#f7f1e8;--paper:rgba(255,255,255,.78);--red:#b5121b;--blue:#1473e6;--gold:#9b6a2d;--shadow:0 18px 60px rgba(34,24,14,.10);--shadow2:0 8px 26px rgba(34,24,14,.08)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--ink);background:linear-gradient(180deg,#fbf7f0 0%,#efe4d4 100%);-webkit-font-smoothing:antialiased}a{text-decoration:none;color:inherit}.bg{position:fixed;inset:0;z-index:-1;overflow:hidden}.bg:before{content:"";position:absolute;right:-120px;top:-120px;width:430px;height:430px;border-radius:50%;background:radial-gradient(circle,rgba(181,18,27,.13),transparent 68%)}.bg:after{content:"";position:absolute;left:-160px;bottom:-180px;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(20,115,230,.10),transparent 68%)}
    .topbar{height:64px;position:sticky;top:0;z-index:20;background:rgba(255,250,244,.86);backdrop-filter:saturate(180%) blur(18px);border-bottom:1px solid rgba(17,17,17,.08)}.navwrap{width:min(1180px,94vw);height:100%;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:18px}.brand{display:flex;align-items:center;gap:10px;font-weight:1000;white-space:nowrap}.mark{width:34px;height:34px;border-radius:10px;background:#b5121b;color:#fff;display:grid;place-items:center;font-weight:1000}.brand span:last-child{font-size:15px}.nav{display:flex;align-items:center;gap:2px;min-width:0}.nav a{padding:9px 13px;border-radius:999px;font-size:14px;font-weight:850;color:#2b2723;white-space:nowrap}.nav a:hover,.nav a.active{background:rgba(17,17,17,.06)}.right{display:flex;align-items:center;gap:10px}.right a{font-size:13px;font-weight:900;white-space:nowrap}.cta{background:#111;color:#fff!important;border-radius:999px;padding:10px 15px!important}.shell{width:min(1180px,94vw);margin:0 auto;padding:34px 0 52px}
    .hero{border:1px solid var(--line);border-radius:30px;background:linear-gradient(135deg,rgba(255,255,255,.85),rgba(255,250,244,.68));box-shadow:var(--shadow);padding:30px;display:grid;grid-template-columns:1fr auto;align-items:end;gap:24px;position:relative;overflow:hidden}.hero:after{content:"";position:absolute;right:-80px;bottom:-120px;width:380px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(181,18,27,.12),transparent 70%)}.eyebrow{margin:0 0 12px;color:var(--red);font-size:12px;font-weight:1000;letter-spacing:.16em}.hero h1{position:relative;z-index:1;margin:0;font-size:clamp(42px,6vw,76px);line-height:.95;letter-spacing:-.075em}.actions{position:relative;z-index:1;display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:12px 17px;font-size:14px;font-weight:1000;box-shadow:var(--shadow2)}.btn.dark{background:#111;color:#fff}.btn.light{background:rgba(255,255,255,.72);border:1px solid var(--line)}
    .productNav{margin-top:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.productPill{border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.66);box-shadow:var(--shadow2);padding:14px 15px;display:flex;align-items:center;gap:12px;min-height:74px;transition:.22s}.productPill:hover{transform:translateY(-2px);background:#fff}.picon{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:#111;color:#fff;font-weight:1000;flex:0 0 auto}.productPill:nth-child(1) .picon{background:#111}.productPill:nth-child(2) .picon{background:#b5121b}.productPill:nth-child(3) .picon{background:#1473e6}.productPill:nth-child(4) .picon{background:#8a612c}.productPill b{display:block;font-size:15px}.productPill small{display:block;margin-top:3px;color:var(--muted);font-size:12px;font-weight:750}.section{padding-top:26px}.sectionHead{display:flex;align-items:end;justify-content:space-between;gap:18px;margin-bottom:14px}.sectionHead h2{margin:0;font-size:clamp(28px,3vw,40px);letter-spacing:-.055em}.sectionHead p{margin:0;color:var(--muted);font-size:14px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{position:relative;overflow:hidden;min-height:330px;border:1px solid var(--line);border-radius:26px;background:var(--paper);box-shadow:var(--shadow);padding:22px;display:flex;flex-direction:column;transition:.28s}.card:hover{transform:translateY(-4px);box-shadow:0 24px 80px rgba(34,24,14,.14)}.card:before{content:"";position:absolute;right:-70px;top:-80px;width:190px;height:190px;border-radius:50%;background:radial-gradient(circle,var(--accent),transparent 68%);opacity:.18}.meta{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}.badge{border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.62);padding:6px 10px;font-size:12px;font-weight:950}.logo{width:58px;height:58px;border-radius:16px;margin-top:34px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),#111);color:#fff;font-size:24px;font-weight:1000;position:relative;z-index:1}.card h3{margin:18px 0 8px;font-size:28px;letter-spacing:-.055em;position:relative;z-index:1}.card p{margin:0;color:var(--muted);line-height:1.6;position:relative;z-index:1}.cardFooter{margin-top:auto;display:flex;gap:10px;position:relative;z-index:1}.open{flex:1;display:flex;align-items:center;justify-content:space-between;background:#111;color:#fff;border-radius:15px;padding:13px 14px;font-weight:1000}.sub{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:rgba(255,255,255,.7);border-radius:15px;padding:13px 14px;font-weight:950;color:#2c2722}.footer{text-align:center;color:var(--muted);font-size:13px;padding:28px 0 0}
    @media(max-width:860px){.topbar{height:auto}.navwrap{padding:10px 0;align-items:flex-start;flex-direction:column}.nav{width:100%;overflow:auto;padding-bottom:2px}.right{display:none}.hero{grid-template-columns:1fr;padding:24px}.actions{justify-content:flex-start}.productNav,.grid{grid-template-columns:1fr}.card{min-height:285px}.shell{padding-top:18px}}@media(max-width:520px){.brand span:last-child{font-size:14px}.hero h1{font-size:44px}.btn{width:100%}.actions{display:grid}.sectionHead{display:block}.sectionHead p{display:none}.productPill{min-height:66px}.logo{margin-top:24px}}
  </style>
</head>
<body>
  <div class="bg"></div>
  <header class="topbar">
    <div class="navwrap">
      <a class="brand" href="/workspace/"><span class="mark">谭</span><span>老谭AI作战指挥室</span></a>
      <nav class="nav" aria-label="项目导航">
        <a href="/" data-key="site">官网</a>
        <a href="/dashboard/#top" data-key="dashboard">驾驶舱</a>
        <a href="/tools/xhs/" data-key="xhs">小红书</a>
        <a href="/tools/scripts/" data-key="scripts">话术</a>
      </nav>
      <div class="right"><a href="/dashboard/#top">项目总览</a><a class="cta" href="/tools/scripts/">开始处理</a></div>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <div>
        <p class="eyebrow">LAOTAN AI COMMAND ROOM</p>
        <h1>老谭AI作战指挥室</h1>
      </div>
      <div class="actions">
        <a class="btn dark" href="/dashboard/#top">驾驶舱</a>
        <a class="btn light" href="/tools/xhs/">小红书</a>
        <a class="btn light" href="/tools/scripts/">话术</a>
      </div>
    </section>

    <section class="productNav" aria-label="快速入口">
      <a class="productPill" href="/"><span class="picon">网</span><span><b>老谭官网</b><small>对外主页</small></span></a>
      <a class="productPill" href="/dashboard/#top"><span class="picon">舱</span><span><b>项目驾驶舱</b><small>项目总控</small></span></a>
      <a class="productPill" href="/tools/xhs/"><span class="picon">红</span><span><b>小红书自动化</b><small>内容生产</small></span></a>
      <a class="productPill" href="/tools/scripts/"><span class="picon">术</span><span><b>话术自动化</b><small>客户沟通</small></span></a>
    </section>

    <section class="section">
      <div class="sectionHead"><h2>项目入口</h2><p>老谭项目系统</p></div>
      <div class="grid">
        <article class="card" style="--accent:#b5121b">
          <div class="meta"><span>01</span><span class="badge">项目总控</span></div>
          <div class="logo">舱</div>
          <h3>项目驾驶舱</h3>
          <p>项目结构、品牌主线、资料入口。</p>
          <div class="cardFooter"><a class="open" href="/dashboard/#top"><span>打开</span><span>→</span></a></div>
        </article>
        <article class="card" style="--accent:#1473e6">
          <div class="meta"><span>02</span><span class="badge">内容生产</span></div>
          <div class="logo">红</div>
          <h3>小红书自动化</h3>
          <p>对标拆解、素材整理、内容成稿。</p>
          <div class="cardFooter"><a class="open" href="/tools/xhs/"><span>打开</span><span>→</span></a></div>
        </article>
        <article class="card" style="--accent:#9b6a2d">
          <div class="meta"><span>03</span><span class="badge">客户沟通</span></div>
          <div class="logo">术</div>
          <h3>话术自动化</h3>
          <p>客户原话、品牌边界、回复生成。</p>
          <div class="cardFooter"><a class="open" href="/tools/scripts/"><span>打开</span><span>→</span></a></div>
        </article>
      </div>
    </section>
    <footer class="footer">老谭AI作战指挥室</footer>
  </main>
</body>
</html>
