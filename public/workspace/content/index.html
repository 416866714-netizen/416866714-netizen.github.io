<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>内容生产中台｜老谭AI作战指挥室</title><style>
:root{--ink:#111;--muted:#6f675f;--line:rgba(17,17,17,.12);--paper:rgba(255,255,255,.82);--red:#b5121b;--blue:#1473e6;--shadow:0 18px 60px rgba(34,24,14,.10);--shadow2:0 8px 26px rgba(34,24,14,.08);--radius:24px}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--ink);background:linear-gradient(180deg,#fbf7f0 0%,#efe4d4 100%);-webkit-font-smoothing:antialiased}a{text-decoration:none;color:inherit}button,input,textarea,select{font:inherit}button{cursor:pointer}.topbar{height:64px;position:sticky;top:0;z-index:20;background:rgba(255,250,244,.9);backdrop-filter:saturate(180%) blur(18px);border-bottom:1px solid rgba(17,17,17,.08)}.navwrap{width:min(1180px,94vw);height:100%;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:18px}.brand{display:flex;align-items:center;gap:10px;font-weight:1000}.mark{width:34px;height:34px;border-radius:10px;background:#b5121b;color:#fff;display:grid;place-items:center}.nav{display:flex;gap:4px;align-items:center;overflow:auto}.nav a{padding:9px 12px;border-radius:999px;font-size:14px;font-weight:850;white-space:nowrap}.nav a:hover{background:rgba(17,17,17,.06)}.shell{width:min(1180px,94vw);margin:0 auto;padding:26px 0 54px}.hero{border:1px solid var(--line);border-radius:30px;background:linear-gradient(135deg,rgba(255,255,255,.86),rgba(255,250,244,.68));box-shadow:var(--shadow);padding:28px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:end}.eyebrow{margin:0 0 10px;color:var(--red);font-size:12px;font-weight:1000;letter-spacing:.16em}.hero h1{margin:0;font-size:clamp(36px,5vw,64px);line-height:.96;letter-spacing:-.07em}.hero p{margin:10px 0 0;color:var(--muted);font-weight:750}.btn{display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:999px;padding:12px 17px;font-size:14px;font-weight:1000;box-shadow:var(--shadow2);background:#111;color:#fff}.btn.light{background:#fff;color:#111;border:1px solid var(--line)}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.section{padding-top:22px}.sectionHead{display:flex;align-items:end;justify-content:space-between;gap:18px;margin-bottom:14px}.sectionHead h2{margin:0;font-size:clamp(26px,3vw,38px);letter-spacing:-.055em}.sectionHead p{margin:0;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.module{border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.78);box-shadow:var(--shadow2);padding:16px;min-height:150px;display:flex;flex-direction:column;gap:10px;transition:.22s}.module:hover{transform:translateY(-3px);background:#fff}.module i{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--accent,#111),#111);color:#fff;display:grid;place-items:center;font-style:normal;font-weight:1000}.module b{font-size:18px;letter-spacing:-.04em}.module small{color:var(--muted);line-height:1.45}.module span{margin-top:auto;color:var(--blue);font-size:13px;font-weight:1000}.tool{display:grid;grid-template-columns:370px 1fr;gap:16px;align-items:start;margin-top:18px}.panel{border:1px solid var(--line);border-radius:var(--radius);background:var(--paper);box-shadow:var(--shadow2);overflow:hidden}.panel h3{margin:0;padding:15px 16px;border-bottom:1px solid var(--line);font-size:20px;letter-spacing:-.04em}.panelBody{padding:16px;display:grid;gap:12px}.field{display:grid;gap:7px}.field label{font-size:12px;font-weight:950;color:#403a34}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:15px;background:#fff;padding:11px 12px;outline:none}.field textarea{min-height:96px;resize:vertical;line-height:1.55}.field textarea.tall{min-height:150px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.gen{border:0;border-radius:15px;background:#111;color:#fff;padding:13px 14px;font-weight:1000}.ghost{border:1px solid var(--line);border-radius:15px;background:#fff;padding:12px 14px;font-weight:950}.result{min-height:360px;white-space:pre-wrap;line-height:1.72;color:#2b2722}.brandCards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.brandCard{border:1px solid var(--line);border-radius:20px;background:#fff;padding:15px;display:grid;gap:8px}.brandCard b{font-size:18px}.brandCard p{margin:0;color:var(--muted);line-height:1.55;font-size:13px}.metricGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.metric{border:1px solid var(--line);border-radius:18px;background:#fff;padding:13px}.metric b{display:block;color:var(--muted);font-size:12px}.metric strong{display:block;margin-top:6px;font-size:24px}.miniTable{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden}.miniTable th,.miniTable td{border-bottom:1px solid var(--line);padding:10px;text-align:left;font-size:13px}.miniTable th{background:#f6efe5;font-weight:1000}.notice{border:1px solid rgba(20,115,230,.16);background:#eef6ff;border-radius:18px;padding:13px;color:#1e4f86;line-height:1.55;font-size:13px}.footer{text-align:center;color:var(--muted);font-size:13px;padding:28px 0 0}@media(max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}.tool{grid-template-columns:1fr}.hero{grid-template-columns:1fr}.actions{justify-content:flex-start}.brandCards,.metricGrid{grid-template-columns:1fr}}@media(max-width:640px){.topbar{height:auto}.navwrap{padding:10px 0;align-items:flex-start;flex-direction:column}.nav{width:100%}.grid,.two{grid-template-columns:1fr}.hero{padding:22px}.hero h1{font-size:42px}.actions{display:grid}.btn{width:100%}.sectionHead{display:block}.sectionHead p{display:none}}
</style></head><body><header class="topbar"><div class="navwrap"><a class="brand" href="/workspace/"><span class="mark">谭</span><span>老谭AI作战指挥室</span></a><nav class="nav"><a href="/workspace/">总入口</a><a href="/">官网</a><a href="/dashboard/#top">驾驶舱</a><a href="/tools/xhs/">小红书</a><a href="/tools/scripts/">话术</a></nav></div></header><main class="shell"><section class="hero"><div><p class="eyebrow">LAOTAN MODULE</p><h1>内容生产中台</h1><p>按账号资产生成选题和内容方案。</p></div><div class="actions"><a class="btn light" href="/workspace/">返回总入口</a></div></section><section class="section tool"><div class="panel"><h3>内容生产中台</h3><div class="panelBody"><div class="field"><label>账号资产</label><select id="ctAccount"><option>老谭个人IP</option><option>宅师傅半包</option><option>8K设计</option><option>玖玖精装</option><option>玖玖精工</option></select></div><div class="two"><div class="field"><label>内容目的</label><select id="ctGoal"><option>获客</option><option>信任建立</option><option>案例种草</option><option>报价解释</option><option>私信转化</option></select></div><div class="field"><label>客户阶段</label><select id="ctStage"><option>刚准备装修</option><option>正在比选</option><option>已有报价</option><option>准备签约</option></select></div></div><div class="field"><label>素材 / 想法</label><textarea id="ctInput" class="tall" placeholder="粘贴案例、客户问题、竞品笔记或你想表达的观点"></textarea></div><button class="gen" onclick="makeContent()">生成内容方案</button></div></div><div class="panel"><h3>内容方案</h3><div class="panelBody"><div class="result" id="contentResult">选择账号后生成。</div><button class="ghost" onclick="copyText('contentResult')">复制方案</button></div></div></section><footer class="footer">老谭AI作战指挥室</footer></main><script>
const $=id=>document.getElementById(id);function val(id){return ($(id)?.value||'').trim()}function pct(a,b){a=Number(a)||0;b=Number(b)||0;return b?Math.round(a/b*100)+'%':'0%'}function copyText(id){navigator.clipboard&&navigator.clipboard.writeText($(id).textContent);}
function makeClient(){const risk=[];const stage=val('cStage'), budget=val('cBudget'), problem=val('cProblem');if(stage.includes('签约'))risk.push('签约前风险');if(problem.includes('报价')||problem.includes('预算'))risk.push('报价预算风险');if(problem.includes('合同'))risk.push('合同条款风险');if(problem.includes('公司'))risk.push('装修公司筛选');$('clientResult').textContent=`客户摘要\n\n称呼：${val('cName')||'未填'}\n联系方式：${val('cPhone')||'未填'}\n小区/面积：${val('cArea')||'未填'} / ${val('cSize')||'未填'}\n阶段：${stage}\n预算：${budget||'未填'}\n装修方式：${val('cType')}\n核心问题：${problem||'未填'}\n\n初步标签：${risk.length?risk.join(' / '):'待进一步判断'}\n建议动作：先补齐户型图、报价单或合同截图，再进入对应报告生成。`;}
function makeReport(){const t=val('rType'), input=val('rInput')||'待补充客户资料';let map={99:['客户基本情况','装修阶段判断','需求与预算匹配','装修方式建议','下一步行动'],199:['报价总体判断','漏项风险','模糊项风险','高风险费用项','沟通问题清单'],399:['合同基础判断','付款节点风险','工期与材料风险','施工边界风险','签约前问题清单'],498:['报价体检结论','合同风险结论','签约前双检问题清单','是否建议继续推进','补充材料清单']};$('reportResult').textContent=`老谭装修顾问报告草稿｜${$('rType').selectedOptions[0].text}\n\n客户资料摘要：\n${input}\n\n报告结构：\n${map[t].map((x,i)=>`${i+1}. ${x}\n- 初步判断：待老谭复核。\n- 需要补充：相关截图、报价明细、合同条款。`).join('\n')}\n\n结论草稿：当前仅为初步整理，最终判断以老谭人工复核为准。`;}
function makeMatch(){const b=val('mBudget'), s=val('mStage'), n=val('mNeed');let level='B级｜可培育客户', res='老谭装修前判断';if(b==='40万以上'||n==='想要设计审美'||n==='精装房改造'){level='A级｜重点跟进客户';res=n==='想要设计审美'?'8K设计 / 高审美全案':'玖玖精装 / 全案改造';}if(n==='找靠谱施工'){res=b==='10-20万'||b==='10万以内'?'宅师傅半包':'玖玖精工 / 高标准半包';}if(s==='准备签约'||n==='合同报价风险'){level='A级｜高转化高风险客户';res='199/399/498 签约前检查';}$('matchResult').textContent=`客户分级：${level}\n\n预算：${b}\n阶段：${s}\n核心需求：${n}\n\n推荐资源方向：${res}\n\n风险标签：${s.includes('签约')?'签约前风险 / ':''}${n.includes('预算')?'预算不清 / ':''}${n.includes('合同')?'合同报价风险 / ':''}需人工复核\n\n推进建议：先明确客户是否愿意补充户型图、报价单、合同或当前沟通截图，再决定进入咨询服务、资源匹配或继续培育。\n\n案例价值：如客户资料完整且问题典型，可脱敏沉淀为案例。`;}
function renderBrands(){const box=$('brandCards'); if(!box)return; const brands=[['老谭个人IP','长沙装修避坑顾问','装修前判断、报价合同、公司筛选','理需求 / 定预算 / 定方向 / 审报价合同','站在业主这边，先判断再推荐'],['宅师傅半包','平价高标准半包','普通家庭、预算敏感、怕被坑','438半包 / 免费量房 / 先施工后付款','低决策成本，先把预算搞清楚'],['8K设计','高审美全案设计','大平层、复式、别墅、重视审美','4K效果图 / 设计费清晰 / 能落地','好设计，不溢价'],['玖玖精装','高端精装房全案改造','高端楼盘、精装房、大平层','同楼盘案例 / 全案交付 / 完工落地','设计+改造+定制+软装一体'],['玖玖精工','高标准半包施工','已有图纸、找施工方、怕施工翻车','真实工地 / 工艺标准 / 图纸精算','附近工地和施工细节建立信任']]; box.innerHTML=brands.map(b=>`<article class="brandCard"><b>${b[0]}</b><p><strong>定位：</strong>${b[1]}</p><p><strong>客户：</strong>${b[2]}</p><p><strong>内容：</strong>${b[3]}</p><p><strong>承接：</strong>${b[4]}</p></article>`).join('');}
function makeData(){const c=val('dContent'),m=val('dMsg'),w=val('dWx'),v=val('dVisit'),d=val('dDeal'),inc=val('dIncome');$('metrics').innerHTML=[['加微信率',pct(w,m)],['到访率',pct(v,w)],['成交率',pct(d,v)],['内容数',c],['成交数',d],['收入','¥'+(Number(inc)||0)]].map(x=>`<div class="metric"><b>${x[0]}</b><strong>${x[1]}</strong></div>`).join('');let note='';if(Number(m)&&Number(w)/Number(m)<.2)note+='私信到微信偏低，优先检查私信钩子。\n';if(Number(w)&&Number(v)/Number(w)<.2)note+='微信到访偏低，优先检查长期跟进节奏。\n';if(Number(v)&&Number(d)/Number(v)<.25)note+='到访成交偏低，优先复盘客户质量和接待话术。\n';$('dataResult').textContent=`经营判断\n\n${note||'当前数据样本较少，继续记录后再判断。'}\n下一步：把高转化内容、典型客户问题和成交案例沉淀到案例库。`;}
function makeContent(){const a=val('ctAccount'),g=val('ctGoal'),st=val('ctStage'),inp=val('ctInput')||'待补充素材';const map={'老谭个人IP':'装修前判断、报价合同、公司筛选、站在业主这边','宅师傅半包':'438半包、免费量房出图预算、先施工后付款、普通家庭','8K设计':'高审美、4K效果图、设计费清晰、设计能落地','玖玖精装':'高端楼盘、精装房改造、全案交付、同楼盘案例','玖玖精工':'真实工地、半包施工、工艺标准、图纸精算'};$('contentResult').textContent=`内容方案｜${a}\n\n账号定位：${map[a]}\n内容目的：${g}\n客户阶段：${st}\n素材摘要：${inp}\n\n标题方向：\n1. ${st}的长沙业主，先别急着定装修\n2. ${a}最适合讲清楚的一个问题\n3. 用一个真实案例讲透${g}\n\n正文结构：\n- 开头：点出客户当前困惑。\n- 中段：用案例或判断拆解问题。\n- 结尾：给出下一步动作。\n\n私信承接：如果你也遇到类似情况，可以把小区、面积和当前阶段发我，我先帮你看方向。\n\n可沉淀标签：${a} / ${g} / ${st}`;}
function makeDialog(){const brand=val('dgBrand'),text=val('dgText')||'客户原话未填写';let intent='早期咨询',risk='信息不足',next='先问小区、面积、装修阶段';if(/报价|多少钱|价格|预算|费用/.test(text)){intent='价格/预算咨询';risk='只比价格';next='先问面积和装修方式，再给区间和判断口径';}if(/合同|签约|付款|增项/.test(text)){intent='签约风险咨询';risk='签约前高风险';next='引导发合同/报价关键截图，进入签约前检查';}if(/工地|施工|半包/.test(text)){intent='施工与工地咨询';risk='需要验证真实工地';next='问区域，匹配附近工地或工艺资料';}if(/设计|效果图|风格/.test(text)){intent='设计审美咨询';risk='审美需求需案例匹配';next='问楼盘面积风格，发同类案例';}$('dialogResult').textContent=`客户判断｜${brand}\n\n客户原话：${text}\n\n意图判断：${intent}\n风险点：${risk}\n下一步：${next}\n\n建议回复：\n可以的，我先了解一下你家的基础情况：小区、面积、现在到哪个阶段了？如果你已经有报价、合同或效果图，也可以先发我关键截图，我先帮你看风险点和下一步怎么判断。\n\n推荐物料：根据客户信息匹配案例、报价说明、合同风险清单或工地资料。`;}
function makeFollow(){const b=val('fwBrand'),day=Number(val('fwDay'))||1,area=val('fwArea')||'客户小区',st=val('fwStatus');let action='了解客户阶段，补齐小区、面积、需求';let material='基础资料选择卡';if(day>=2){action='发送相关案例，建立第一层信任';material=b==='8K设计'?'4K效果图 / 同风格案例':'真实案例 / 工地 / 报价说明';}if(day>=5){action='发送效果图 vs 完工图或同类案例，形成信任峰值';material='对比型证明物料';}if(day>=7){action='轻邀约到店、看工地、量房或做一次装修前判断';material='轻邀约话术';}$('followResult').textContent=`今日跟进｜${b}\n\n客户：${area}\n加微信第 ${day} 天\n状态：${st}\n\n今日动作：${action}\n建议物料：${material}\n\n建议话术：\n我按你家情况整理了一份更接近的参考，你可以先不用急着定，先看方向对不对。方便的话把面积和目前最担心的问题发我，我帮你判断下一步应该重点看什么。\n\n下次提醒：如果今天不回复，隔 2 天用同类案例轻跟进，不连续催成交。`;}
function makeReview(){const n=val('rvName')||'未命名项目',p=val('rvProcess')||'待补充过程';$('reviewResult').textContent=`项目复盘｜${n}\n\n过程记录：\n${p}\n\n1. 是否形成案例：待判断，可先脱敏保存。\n2. 沉淀的方法论：从客户问题中提炼可复用判断标准。\n3. 训练的AI工作流：资料整理、话术判断、报告生成或跟进节奏。\n4. 增强的品牌资产：专业判断力、案例证明、客户信任。\n5. 暴露的风险：资料不完整、边界不清、客户阶段不明。\n6. 下次更省力：先用表单收集资料，再进入判断。\n7. 可公开内容：脱敏后可做小红书选题。\n8. 内部沉淀内容：客户标签、风险点、回复模板、服务边界。\n\n结论：该项目应进入案例素材库，并标记公开等级。`;}
function makeCase(){const t=val('csType'),o=val('csOpen'),txt=val('csText')||'待补充案例内容';$('caseResult').textContent=`案例卡｜${t}\n\n公开等级：${o}\n\n案例内容：\n${txt}\n\n可提炼价值：\n- 客户真实问题\n- 老谭判断过程\n- 风险或机会点\n- 最终建议 / 结果\n\n适用位置：\n- ${o==='可公开'?'小红书内容 / 服务页背书 / 咨询转化':'内部复盘 / 话术训练 / 方法论沉淀'}\n\n脱敏提醒：隐藏客户姓名、电话、具体房号、合同敏感信息。\n\n下一步：补充截图、结果数据和前后对比。`;}
renderBrands();
</script></body></html>
