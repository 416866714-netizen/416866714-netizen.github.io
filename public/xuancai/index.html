<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>长沙装修选材清单</title>
  <meta name="description" content="长沙装修选材清单，按品类浏览品牌、优势、价格区间和店铺地址。" />
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #fff;
      --ink: #151923;
      --muted: #667085;
      --line: #e5e7eb;
      --soft: #f0f3f6;
      --dark: #111827;
      --blue: #1f5f99;
      --green: #17735a;
      --orange: #b86226;
      --radius: 8px;
      --bottom: 82px;
      --shadow: 0 10px 24px rgba(17, 24, 39, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button { font: inherit; }
    a { color: inherit; text-decoration: none; }

    .page {
      width: min(100%, 480px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 12px 12px calc(var(--bottom) + env(safe-area-inset-bottom));
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: -12px -12px 0;
      padding: 12px 12px 10px;
      background: rgba(245, 246, 248, .96);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(229, 231, 235, .82);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
      font-weight: 950;
    }

    .count {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 6px 9px;
      color: var(--muted);
      background: #fff;
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 800;
    }

    .subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 0 2px;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex: 0 0 auto;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: #fff;
      color: #344054;
      font-size: 13px;
      font-weight: 850;
      cursor: pointer;
    }

    .tab.active {
      color: #fff;
      background: var(--dark);
      border-color: var(--dark);
    }

    .list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-main {
      padding: 14px;
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      min-width: 0;
    }

    .brand h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.25;
      font-weight: 950;
    }

    .brand span {
      display: inline-flex;
      margin-top: 7px;
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--soft);
      color: #475467;
      font-size: 12px;
      font-weight: 820;
    }

    .price {
      flex: 0 0 auto;
      color: var(--orange);
      font-size: 15px;
      line-height: 1.25;
      font-weight: 950;
      text-align: right;
      max-width: 130px;
    }

    .advantage {
      margin: 12px 0 0;
      color: #344054;
      font-size: 14px;
      line-height: 1.55;
      font-weight: 650;
    }

    .meta {
      display: grid;
      gap: 7px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .meta-row {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 8px;
    }

    .meta-row b {
      color: #475467;
      font-weight: 900;
    }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--line);
      border-top: 1px solid var(--line);
    }

    .card-actions button {
      min-height: 44px;
      border: 0;
      background: #fff;
      color: var(--dark);
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .card-actions button.primary {
      color: #fff;
      background: linear-gradient(135deg, var(--green), var(--blue));
    }

    .empty {
      display: none;
      margin-top: 12px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 20px 14px;
      text-align: center;
      color: var(--muted);
      background: #fff;
      font-size: 14px;
    }

    .bottom {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      padding: 9px 12px calc(9px + env(safe-area-inset-bottom));
      background: rgba(255, 255, 255, .95);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .bottom-inner {
      width: min(100%, 480px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .bottom button {
      min-height: 46px;
      border: 0;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 950;
      cursor: pointer;
    }

    .consult {
      color: #fff;
      background: var(--dark);
    }

    .copy {
      color: #fff;
      background: linear-gradient(135deg, var(--green), var(--blue));
    }

    .drawer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: calc(var(--bottom) + env(safe-area-inset-bottom));
      z-index: 30;
      transform: translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
      padding: 0 12px;
    }

    .drawer.show {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .drawer-card {
      width: min(100%, 480px);
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 0 20px 56px rgba(17, 24, 39, .18);
      padding: 12px;
    }

    .drawer-title {
      margin: 0;
      font-size: 15px;
      font-weight: 950;
    }

    .drawer-text {
      margin: 8px 0 0;
      color: #344054;
      font-size: 13px;
      line-height: 1.55;
      word-break: break-all;
    }

    .toast {
      position: fixed;
      left: 50%;
      top: 16px;
      z-index: 40;
      transform: translateX(-50%) translateY(-8px);
      opacity: 0;
      pointer-events: none;
      border-radius: 999px;
      padding: 9px 12px;
      color: #fff;
      background: rgba(17, 24, 39, .94);
      font-size: 13px;
      font-weight: 850;
      transition: .18s ease;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 560px) {
      body { background: #e9edf2; }
      .page {
        margin-top: 16px;
        margin-bottom: 16px;
        background: var(--bg);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="top">
      <div class="top-row">
        <h1>长沙装修选材清单</h1>
        <span class="count" id="count">0 家</span>
      </div>
      <p class="subtitle">按品类看品牌、优势、价格区间和店铺地址。第一版为占位资源，后续替换真实商家。</p>
      <nav class="tabs" id="tabs" aria-label="品类筛选"></nav>
    </header>

    <section class="list" id="list" aria-label="品牌列表"></section>
    <section class="empty" id="empty">当前品类暂无资源。</section>
  </main>

  <aside class="drawer" id="drawer" aria-live="polite">
    <div class="drawer-card">
      <p class="drawer-title">咨询话术</p>
      <p class="drawer-text" id="drawerText">请选择一家品牌。</p>
    </div>
  </aside>

  <footer class="bottom">
    <div class="bottom-inner">
      <button class="consult" type="button" id="consultBtn">咨询这家</button>
      <button class="copy" type="button" id="copyBtn">复制咨询话术</button>
    </div>
  </footer>

  <div class="toast" id="toast">已复制咨询话术</div>

  <script>
    const categories = ["全部", "全屋定制", "瓷砖", "卫浴", "木门", "地板", "家电", "软装", "窗帘", "美缝"];

    const items = [
      { category: "全屋定制", brand: "定制品牌 A", advantage: "适合刚需和改善型家庭，主打本地测量、报价透明、基础五金配置清楚。", price: "¥800-1500/㎡", address: "待补充：长沙某全屋定制展厅" },
      { category: "全屋定制", brand: "定制品牌 B", advantage: "适合重视颜值和收纳的业主，可做柜门颜色、拉手、灯带和局部高配。", price: "¥1200-2200/㎡", address: "待补充：长沙某家居卖场" },
      { category: "瓷砖", brand: "瓷砖品牌 A", advantage: "常规规格选择多，适合客餐厅、厨房、卫生间一次性搭配。", price: "¥60-180/片", address: "待补充：长沙某瓷砖门店" },
      { category: "瓷砖", brand: "瓷砖品牌 B", advantage: "适合现代、奶油、原木风，重点看加工、损耗、补货和铺贴方式。", price: "¥90-260/片", address: "待补充：长沙某建材市场" },
      { category: "卫浴", brand: "卫浴品牌 A", advantage: "适合普通家庭整套配置，马桶、花洒、浴室柜、五金可组合。", price: "¥3000-8000/套", address: "待补充：长沙某卫浴展厅" },
      { category: "卫浴", brand: "卫浴品牌 B", advantage: "适合想做智能马桶和品质花洒的业主，需提前确认尺寸和电位。", price: "¥6000-15000/套", address: "待补充：长沙某品牌门店" },
      { category: "木门", brand: "木门品牌 A", advantage: "适合预算型家庭，重点看门套、锁具、合页和安装是否包含。", price: "¥1200-2600/樘", address: "待补充：长沙某木门门店" },
      { category: "木门", brand: "木门品牌 B", advantage: "适合改善型装修，可看静音、材质、门套线和颜色稳定性。", price: "¥2200-4500/樘", address: "待补充：长沙某家居卖场" },
      { category: "地板", brand: "地板品牌 A", advantage: "适合卧室和客厅局部铺装，重点看环保、辅料、安装和损耗。", price: "¥120-280/㎡", address: "待补充：长沙某地板门店" },
      { category: "地板", brand: "地板品牌 B", advantage: "适合对脚感和颜值要求更高的业主，可看实木复合和高端系列。", price: "¥260-600/㎡", address: "待补充：长沙某地板展厅" },
      { category: "家电", brand: "家电品牌 A", advantage: "适合提前确定冰箱、洗碗机、洗烘套装和净水设备尺寸。", price: "¥8000-30000/套", address: "待补充：长沙某家电卖场" },
      { category: "家电", brand: "家电品牌 B", advantage: "适合嵌入式家电和全屋智能需求，需配合定制柜提前预留。", price: "¥20000-60000/套", address: "待补充：长沙某品牌体验店" },
      { category: "软装", brand: "软装品牌 A", advantage: "适合沙发、餐桌、床、灯具、装饰画集中搭配，控制整体风格。", price: "¥10000-50000/套", address: "待补充：长沙某软装展厅" },
      { category: "软装", brand: "软装品牌 B", advantage: "适合改善型客户，可做色彩、材质、灯光和家具整体方案。", price: "¥30000-100000/套", address: "待补充：长沙某设计集合店" },
      { category: "窗帘", brand: "窗帘品牌 A", advantage: "适合普通家庭全屋窗帘，重点看褶皱倍数、轨道、纱帘和安装。", price: "¥3000-12000/套", address: "待补充：长沙某窗帘门店" },
      { category: "窗帘", brand: "窗帘品牌 B", advantage: "适合看重遮光、质感和色彩统一的业主，可做全屋搭配。", price: "¥8000-25000/套", address: "待补充：长沙某软装馆" },
      { category: "美缝", brand: "美缝施工 A", advantage: "适合常规瓷砖美缝，重点看材料、施工方式、计价口径和售后。", price: "¥18-35/米", address: "待补充：长沙本地施工服务" },
      { category: "美缝", brand: "美缝施工 B", advantage: "适合大砖、异形砖和高要求区域，需看样板和现场施工标准。", price: "¥30-60/米", address: "待补充：长沙本地施工团队" }
    ];

    const tabs = document.getElementById("tabs");
    const list = document.getElementById("list");
    const empty = document.getElementById("empty");
    const count = document.getElementById("count");
    const drawer = document.getElementById("drawer");
    const drawerText = document.getElementById("drawerText");
    const toast = document.getElementById("toast");
    const consultBtn = document.getElementById("consultBtn");
    const copyBtn = document.getElementById("copyBtn");
    let activeCategory = "全部";
    let activeItem = items[0];

    function consultText(item) {
      return `你好，我想咨询【${item.brand}】。品类：${item.category}；价格区间：${item.price}；地址：${item.address}。麻烦帮我看看这个资源是否适合我家。`;
    }

    function setActiveItem(item) {
      activeItem = item;
      drawerText.textContent = consultText(item);
      drawer.classList.add("show");
    }

    function renderTabs() {
      tabs.innerHTML = categories.map(category => (
        `<button class="tab${category === activeCategory ? " active" : ""}" type="button" data-category="${category}">${category}</button>`
      )).join("");
      tabs.querySelectorAll(".tab").forEach(button => {
        button.addEventListener("click", () => {
          activeCategory = button.dataset.category;
          renderTabs();
          renderList();
        });
      });
    }

    function renderList() {
      const filtered = activeCategory === "全部" ? items : items.filter(item => item.category === activeCategory);
      count.textContent = `${filtered.length} 家`;
      empty.style.display = filtered.length ? "none" : "block";
      list.innerHTML = filtered.map((item, index) => `
        <article class="card">
          <div class="card-main">
            <div class="card-head">
              <div class="brand">
                <h2>${item.brand}</h2>
                <span>${item.category}</span>
              </div>
              <div class="price">${item.price}</div>
            </div>
            <p class="advantage">${item.advantage}</p>
            <div class="meta">
              <div class="meta-row"><b>地址</b><span>${item.address}</span></div>
            </div>
          </div>
          <div class="card-actions">
            <button type="button" data-index="${items.indexOf(item)}">看话术</button>
            <button class="primary" type="button" data-copy="${items.indexOf(item)}">咨询这家</button>
          </div>
        </article>
      `).join("");

      list.querySelectorAll("[data-index]").forEach(button => {
        button.addEventListener("click", () => setActiveItem(items[Number(button.dataset.index)]));
      });
      list.querySelectorAll("[data-copy]").forEach(button => {
        button.addEventListener("click", async () => {
          setActiveItem(items[Number(button.dataset.copy)]);
          await copyActiveText();
        });
      });
      if (filtered[0]) setActiveItem(filtered[0]);
    }

    async function copyActiveText() {
      const text = consultText(activeItem);
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const temp = document.createElement("textarea");
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        temp.remove();
      }
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    }

    consultBtn.addEventListener("click", () => setActiveItem(activeItem));
    copyBtn.addEventListener("click", copyActiveText);
    renderTabs();
    renderList();
  </script>
</body>
</html>
